<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ODYL Health — Health Locator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="phone-frame">

  <div class="status-bar">
    <span>9:41</span>
    <div class="status-bar-icons">
      <span>&#9679;&#9679;&#9679;&#9679;</span>
      <span>&#x1F50B;</span>
    </div>
  </div>

  <div id="odyl-header-mount"></div>

  <div class="page-title">
    <h2>Health Locator</h2>
  </div>

  <p class="privacy-note">Sample locations for demo — not live search.</p>

  <div class="content-stack" id="locator-stack">
    <!-- Filled by JS from persona + static list -->
  </div>

  <div id="odyl-nav-mount"></div>

</div>

<script src="js/odyl.js"></script>
<script>
  ODYL.requirePersona();
  ODYL.mountHeader('#odyl-header-mount', 'sub');
  ODYL.mountBottomNav('#odyl-nav-mount', 'none');

  var persona = ODYL.getPersona();
  var sites = [
    { name: 'Johns Hopkins Holy Cross Hospital', line: '5201 Norwood Ave, Baltimore, MD · STI testing' },
    { name: 'Chase Brexton Health Services', line: '1111 N Charles St, Baltimore, MD · Primary &amp; sexual health' },
    { name: 'Baltimore City Health Department', line: '1001 E Fayette St, Baltimore, MD · Public health' },
    { name: 'IWantTheKit (mail-in)', line: 'Maryland home collection — order online' },
    { name: 'LabCorp Patient Service Center', line: 'Various locations · Lab orders' }
  ];

  var seen = {};
  if (persona.tests && persona.tests.length) {
    persona.tests.forEach(function (t) {
      if (t.location && !seen[t.location]) {
        seen[t.location] = true;
        sites.unshift({ name: t.location, line: 'From your demo test history' });
      }
    });
  }

  var stack = document.getElementById('locator-stack');
  var card = document.createElement('div');
  card.className = 'info-card';
  card.innerHTML = '<h3>Places near you</h3><p style="margin-bottom:12px;">These entries mirror locations in your persona&rsquo;s synthetic record where applicable.</p>';
  sites.forEach(function (s) {
    var row = document.createElement('div');
    row.className = 'locator-item';
    row.innerHTML = '<strong>' + s.name + '</strong><div class="locator-meta">' + s.line + '</div>';
    card.appendChild(row);
  });
  stack.appendChild(card);
</script>

</body>
</html>
