<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ODYL Health — Health Locator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="phone-frame">

  <div class="status-bar">
    <span>9:41</span>
    <div class="status-bar-icons">
      <span>&#9679;&#9679;&#9679;&#9679;</span>
      <span>&#x1F50B;</span>
    </div>
  </div>

  <div id="odyl-header-mount"></div>

  <div class="page-title">
    <h2>Health Locator</h2>
  </div>

  <p class="privacy-note">Sample locations for demo — not live search.</p>

  <div class="content-stack" id="locator-stack">
    <!-- Filled by JS from persona + static list -->
  </div>

  <div id="odyl-nav-mount"></div>

</div>

<script src="js/odyl.js"></script>
<script>
  ODYL.requirePersona();
  ODYL.mountHeader('#odyl-header-mount', 'sub');
  ODYL.mountBottomNav('#odyl-nav-mount', 'none');

  var persona = ODYL.getPersona();
  var MAPS_PREFIX = 'https://maps.google.com/maps?q=';
  var IWTK_URL = 'https://iwantthekit.org/';

  function isIWantTheKit(name) {
    return name && /iwantthekit/i.test(String(name).replace(/\s/g, ''));
  }

  function locatorHref(s) {
    if (s.url) return s.url;
    if (s.address) return MAPS_PREFIX + encodeURIComponent(s.address);
    return '';
  }

  var sites = [
    {
      name: 'Johns Hopkins Holy Cross Hospital',
      line: '5201 Norwood Ave, Baltimore, MD · STI testing',
      address: '5201 Norwood Ave, Baltimore, MD'
    },
    {
      name: 'Chase Brexton Health Services',
      line: '1111 N Charles St, Baltimore, MD · Primary &amp; sexual health',
      address: '1111 N Charles St, Baltimore, MD'
    },
    {
      name: 'Baltimore City Health Department',
      line: '1001 E Fayette St, Baltimore, MD · Public health',
      address: '1001 E Fayette St, Baltimore, MD'
    },
    {
      name: 'IWantTheKit (mail-in)',
      line: 'Maryland home collection — order online',
      url: IWTK_URL
    },
    {
      name: 'LabCorp Patient Service Center',
      line: 'Various locations · Lab orders',
      address: 'LabCorp Baltimore, MD'
    }
  ];

  var seen = {};
  if (persona.tests && persona.tests.length) {
    persona.tests.forEach(function (t) {
      if (t.location && !seen[t.location]) {
        seen[t.location] = true;
        var entry = { name: t.location, line: 'From your demo test history' };
        if (isIWantTheKit(t.location)) {
          entry.url = IWTK_URL;
        } else {
          entry.address = t.location + ', Baltimore, MD';
        }
        sites.unshift(entry);
      }
    });
  }

  var stack = document.getElementById('locator-stack');
  var card = document.createElement('div');
  card.className = 'info-card';
  card.innerHTML = '<h3>Places near you</h3><p style="margin-bottom:12px;">These entries mirror locations in your persona&rsquo;s synthetic record where applicable.</p>';
  sites.forEach(function (s) {
    var href = locatorHref(s);
    var inner = '<strong>' + s.name + '</strong><div class="locator-meta">' + s.line + '</div>';
    var row;
    if (href) {
      row = document.createElement('a');
      row.className = 'locator-item locator-item--link';
      row.href = href;
      if (s.url) {
        row.target = '_blank';
        row.rel = 'noopener noreferrer';
      }
      row.innerHTML = inner;
    } else {
      row = document.createElement('div');
      row.className = 'locator-item';
      row.innerHTML = inner;
    }
    card.appendChild(row);
  });
  stack.appendChild(card);
</script>

</body>
</html>
