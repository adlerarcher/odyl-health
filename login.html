<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ODYL Health - Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div class="phone-frame">

  <div class="status-bar">
    <span>9:41</span>
    <div class="status-bar-icons">
      <span>&#9679;&#9679;&#9679;&#9679;</span>
      <span>&#x1F50B;</span>
    </div>
  </div>

  <div id="odyl-header-mount"></div>

  <div class="login-container">
    <div id="login-session-banner" class="login-session-banner" style="display: none;">
      <p>Logged in as <strong id="login-session-name"></strong></p>
      <button type="button" class="action-btn outline-dark btn-login-switch" id="btn-login-switch">Switch profile</button>
    </div>

    <h3>Choose Your Profile</h3>
    <p>Select a persona to explore ODYL. Each profile has a unique health history, test results, and survey responses.</p>

    <div class="persona-list" id="persona-list"></div>

    <div style="text-align:center; margin-top:20px; font-size:13px; color:var(--text-medium);">
      Or <a href="signup.html" style="color:var(--text-dark); font-weight:700; text-decoration:none;">create your own profile</a>
    </div>
  </div>

</div>

<script src="js/odyl.js"></script>
<script src="js/personas.js"></script>
<script>
(function () {
  ODYL.mountHeader('#odyl-header-mount', 'sub');

  var sessionPersona = ODYL.getPersona();
  if (sessionPersona) {
    var banner = document.getElementById('login-session-banner');
    var nameEl = document.getElementById('login-session-name');
    banner.style.display = 'block';
    nameEl.textContent =
      sessionPersona.First_Name +
      (sessionPersona.Last_Name ? ' ' + sessionPersona.Last_Name : '');
    document.getElementById('btn-login-switch').addEventListener('click', function () {
      ODYL.clearPersona();
      window.location.reload();
    });
  }

  var bgColors = ['#f97085', '#e88a3a', '#7ec89b', '#b491d1', '#5dade2', '#f4a460'];
  var list = document.getElementById('persona-list');
  var personas = window.ODYL_PERSONAS || [];

  personas.forEach(function (p) {
    var initials = p.First_Name[0] + p.Last_Name[0];
    var age = Math.floor((new Date() - new Date(p.DOB)) / (365.25 * 24 * 60 * 60 * 1000));
    var testCount = ODYL.getPersonaTests(p).length;
    var meta =
      age +
      'y/o ' +
      p.Gender +
      ' &middot; ' +
      (testCount > 0 ? testCount + ' test result' + (testCount > 1 ? 's' : '') : 'No test results');

    var card = document.createElement('a');
    card.href = '#';
    card.className = 'persona-card';
    card.innerHTML =
      '<div class="persona-avatar" style="background:' +
      (bgColors[p.bg - 1] || bgColors[0]) +
      '">' +
      initials +
      '</div>' +
      '<div class="persona-details">' +
      '<div class="persona-name">' +
      p.First_Name +
      ' ' +
      p.Last_Name +
      '</div>' +
      '<div class="persona-meta">' +
      meta +
      '</div>' +
      '</div>' +
      '<div class="persona-arrow">&#x203A;</div>';

    card.addEventListener('click', function (e) {
      e.preventDefault();
      ODYL.setPersona(p);
      window.location.href = 'index.html';
    });

    list.appendChild(card);
  });
})();
</script>

</body>
</html>
